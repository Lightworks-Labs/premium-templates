name: Post-Test Traceability Sync

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.test.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/spec/**"
      - "**/__tests__/**"
      - "**/junit*.xml"
      - "**/test-results/**"
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  sync-traceability:
    name: Sync test results to Lightworks
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'skipped'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test artifacts
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const testArtifact = artifacts.data.artifacts.find(a =>
              a.name.includes('test-results') || a.name.includes('junit')
            );
            if (testArtifact) {
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: testArtifact.id,
                archive_format: 'zip',
              });
              require('fs').writeFileSync('/tmp/test-results.zip', Buffer.from(download.data));
            }

      - name: Extract test results
        run: |
          if [ -f /tmp/test-results.zip ]; then
            unzip -o /tmp/test-results.zip -d /tmp/test-results/
          fi
          # Find JUnit XML files in common locations
          find . /tmp/test-results/ -name "*.xml" -path "*/junit*" \
            -o -name "*.xml" -path "*/test-results*" \
            -o -name "junit*.xml" 2>/dev/null | head -20 > /tmp/junit-files.txt
          echo "Found test result files:"
          cat /tmp/junit-files.txt

      - name: Parse and sync test results
        env:
          LIGHTWORKS_API_TOKEN: ${{ secrets.LIGHTWORKS_API_TOKEN }}
          LIGHTWORKS_ORG_ID: ${{ secrets.LIGHTWORKS_ORG_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import os, json, xml.etree.ElementTree as ET, urllib.request, urllib.parse
          from datetime import datetime, timezone

          API_TOKEN = os.environ["LIGHTWORKS_API_TOKEN"]
          ORG_ID = os.environ["LIGHTWORKS_ORG_ID"]
          RUN_URL = os.environ["RUN_URL"]
          NOW = datetime.now(timezone.utc).isoformat()
          BASE_URL = "https://app.lightworks.io/api/v1"

          def lw_request(method, path, body=None):
              url = f"{BASE_URL}/{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, method=method, headers={
                  "Authorization": f"Bearer {API_TOKEN}",
                  "Content-Type": "application/json",
              })
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Parse JUnit XML files
          results = {}  # test_id -> {status, passed}
          junit_files = open("/tmp/junit-files.txt").read().strip().splitlines()
          for fpath in junit_files:
              fpath = fpath.strip()
              if not fpath or not os.path.isfile(fpath):
                  continue
              try:
                  tree = ET.parse(fpath)
                  root = tree.getroot()
                  suites = root.findall(".//testcase")
                  for tc in suites:
                      name = tc.get("name", "")
                      # Match TEST-NNN pattern in test name or classname
                      import re
                      match = re.search(r"TEST-\d+", name + " " + tc.get("classname", ""))
                      if not match:
                          continue
                      test_id = match.group(0)
                      failed = tc.find("failure") is not None or tc.find("error") is not None
                      skipped = tc.find("skipped") is not None
                      status = "skipped" if skipped else ("failed" if failed else "passed")
                      results[test_id] = status
              except Exception as e:
                  print(f"Warning: could not parse {fpath}: {e}")

          if not results:
              print("No test results with TEST-NNN identifiers found — nothing to sync.")
              exit(0)

          print(f"Syncing {len(results)} test results...")

          # Fetch Tests database records
          tests_db = lw_request("GET", f"orgs/{ORG_ID}/databases/tests/records")
          coverage_updates = {}  # requirement_id -> list of statuses

          for record in tests_db.get("records", []):
              test_id = record.get("fields", {}).get("test_id")
              if test_id not in results:
                  continue
              status = results[test_id]
              # Update test record
              lw_request("PATCH", f"orgs/{ORG_ID}/databases/tests/records/{record['id']}", {
                  "fields": {
                      "last_run_status": status,
                      "last_run_at": NOW,
                      "run_url": RUN_URL,
                      "updated_at": NOW,
                  }
              })
              print(f"  Updated {test_id} → {status}")
              # Track for coverage recompute
              for req_id in record.get("fields", {}).get("linked_requirements", []):
                  coverage_updates.setdefault(req_id, []).append(status)

          # Recompute coverage_status on linked Requirements
          for req_record_id, statuses in coverage_updates.items():
              if all(s == "passed" for s in statuses):
                  coverage = "covered"
              elif any(s in ("passed",) for s in statuses):
                  coverage = "partial"
              else:
                  coverage = "uncovered"
              lw_request("PATCH", f"orgs/{ORG_ID}/databases/requirements/records/{req_record_id}", {
                  "fields": {
                      "coverage_status": coverage,
                      "updated_at": NOW,
                  }
              })
              print(f"  Requirements/{req_record_id} coverage → {coverage}")

          print("Traceability sync complete.")
          PYEOF

      - name: Post coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          LIGHTWORKS_API_TOKEN: ${{ secrets.LIGHTWORKS_API_TOKEN }}
          LIGHTWORKS_ORG_ID: ${{ secrets.LIGHTWORKS_ORG_ID }}
        with:
          script: |
            const token = process.env.LIGHTWORKS_API_TOKEN;
            const orgId = process.env.LIGHTWORKS_ORG_ID;
            const baseUrl = `https://app.lightworks.io/api/v1`;

            const res = await fetch(`${baseUrl}/orgs/${orgId}/databases/requirements/records`, {
              headers: { Authorization: `Bearer ${token}` }
            });
            const { records = [] } = await res.json();

            const total = records.length;
            const covered = records.filter(r => r.fields?.coverage_status === 'covered').length;
            const partial = records.filter(r => r.fields?.coverage_status === 'partial').length;
            const uncovered = records.filter(r => r.fields?.coverage_status === 'uncovered').length;
            const pct = total > 0 ? Math.round((covered / total) * 100) : 0;

            const emoji = pct === 100 ? '✅' : pct >= 80 ? '⚠️' : '❌';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `## ${emoji} Traceability Coverage`,
                ``,
                `| Status | Count |`,
                `|---|---|`,
                `| ✅ Covered | ${covered} |`,
                `| 🔶 Partial | ${partial} |`,
                `| ❌ Uncovered | ${uncovered} |`,
                `| **Total** | **${total}** |`,
                ``,
                `**Overall: ${pct}% covered**`,
                ``,
                `[View in Lightworks](https://app.lightworks.io/orgs/${orgId}/databases/requirements)`,
              ].join('\n'),
            });
